# WDM 100GHz 间隔系统默认参数（ITU-T G.694.1 C-band）
# 频率公式: f(n) = start_freq + (n - start_channel) * channel_spacing
#
# ITU-T G.694.1 标准 C-band:
#   C01 = 190.1 THz, C31 = 193.1 THz, C61 = 196.1 THz
#
# 扩展 C-band: 改 end_channel: 71（C71 = 197.1 THz）
# 半信道: 改 start_channel: 1.5（C01.5 = 190.15 THz）

start_freq: 1.901e+14          # 波段起始频率 [Hz]（190.1 THz = C01）
start_channel: 1               # 起始信道号（C01）
end_channel: 61                # 终止信道号（C61 = 196.1 THz）
channel_spacing: 1.0e+11       # 信道间隔 [Hz]（100 GHz）
B_s: 2.5e+10                  # 符号速率（波特率）[Hz]（25 GBaud，适用于 DP-16QAM）
B_q: 1.0e+9                  # 量子信道接收带宽 [Hz]（1 GHz）
data_rate_bps: 2.0e+11       # 比特速率 [bps]（200 Gbps DP-16QAM；NRZ-OOK 为 10.3 Gbps）
                              # DP-16QAM: data_rate = 8 × B_s（4 bits/symbol × 2 polarizations）
                              # NRZ-OOK: data_rate = B_s（1 bit/symbol）；带宽 B ≈ 2 × data_rate（sinc² 主瓣）
P0: 1.0e-3                    # 单信道发射功率 [W]（0 dBm）
beta_rolloff: 0.75             # 升余弦滚降因子（0=矩形谱）
ook_filter_order: 5            # NRZ-OOK Butterworth 滤波器阶数（m=2，默认 1 退化为 Lorentzian）
quantum_channel_indices: []     # 量子信道索引（空=全部为经典）
# 经典泵浦信道 — strategy 与 indices 二选一，indices 有值时忽略 strategy
classical_channel_indices:   # null = 使用 strategy；直接指定如 [38, 39, 40] 则忽略 strategy

classical_channel_strategy:
  name: "equal_interval"
  reference_channel: 35   # ITU G.694.1 C35 = 193.5 THz（量子信道参考点，自身不算经典泵浦）
  num_classical: 2        # 低频侧取 3 个连续 ITU 信道
  reserved:
    - name: "sync"
      channel: 33         # ITU C33 保留（保护带宽 100 GHz，下方经典信道不与其冲突则可用）
      bandwidth_ghz: 100
    - name: "reference"
      channel: 35         # ITU C35 保留（与参考信道重合，实际上不起作用）
      bandwidth_ghz: 20
