# 统一绘图模型配置
# 所有对比绘图脚本（signal_tx, fwm_noise 等）共用此配置
# Usage: load_model_config() -> dict

# =============================================================================
# 模型定义（所有可用模型）
# =============================================================================
models:

  # ---- 离散模型 ----
  discrete:
    label: "Discrete"
    spectrum_type: SINGLE_FREQ
    continuous: false
    beta_rolloff: null

  # ---- Raised Cosine 系列 ----
  raised_cosine:   # 别名，plot_noise_spectrum.py 兼容
    label: "Raised Cosine (β=0 ≡ Rectangular)"
    spectrum_type: RAISED_COSINE
    continuous: true
    beta_rolloff: 0.0

  rc_beta0:       # 同 raised_cosine（别名，用于 signal_tx 等）
    label: "RC (β=0, ≡Rect)"
    spectrum_type: RAISED_COSINE
    continuous: true
    beta_rolloff: 0.0

  rc_beta001:
    label: "RC (β=0.01)"
    spectrum_type: RAISED_COSINE
    continuous: true
    beta_rolloff: 0.01

  rc_beta02:
    label: "RC (β=0.2)"
    spectrum_type: RAISED_COSINE
    continuous: true
    beta_rolloff: 0.2

  rc_beta05:
    label: "RC (β=0.5)"
    spectrum_type: RAISED_COSINE
    continuous: true
    beta_rolloff: 0.5

  rc_beta1:
    label: "RC (β=1)"
    spectrum_type: RAISED_COSINE
    continuous: true
    beta_rolloff: 1.0

  # ---- NRZ-OOK 模型（OOK 调制） ----
  nrz_ook:
    label: "NRZ-OOK"
    spectrum_type: NRZ_OOK
    continuous: true
    beta_rolloff: null

  # ---- OSA 模型 ----
  osa:
    label: "OSA (16QAM)"
    spectrum_type: OSA_SAMPLED
    continuous: true
    beta_rolloff: null

  osa_ook:
    label: "OSA (OOK)"
    spectrum_type: OSA_SAMPLED
    continuous: true
    beta_rolloff: null

# =============================================================================
# 绘图颜色（与模型 key 一一对应）
# =============================================================================
colors:
  discrete:       "#202020"
  raised_cosine:  "#1f77b4"
  rc_beta0:       "#1f77b4"
  rc_beta001:     "#aec7e8"
  rc_beta02:      "#ff7f0e"
  rc_beta05:      "#ff7f0e"
  rc_beta1:       "#d95f02"
  nrz_ook:        "#e377c2"
  osa:            "#2ca02c"
  osa_ook:        "#2ca02c"

# =============================================================================
# 模型分组（不同绘图场景使用的模型列表）
# =============================================================================
model_groups:

  # Signal TX 对比
  signal_tx:
    - discrete
    - rc_beta001
    - rc_beta05
    - osa

  # ---- 16QAM 调制场景 ----
  fwm_noise_16qam:
    - discrete
    - rc_beta001
    - rc_beta05
    - osa

  # 向后兼容别名
  fwm_noise: &fwm_noise_default
    - discrete
    - rc_beta001
    - rc_beta05
    - osa

  # ---- OOK 调制场景 ----
  fwm_noise_ook:
    - discrete
    - nrz_ook
    - osa_ook

  # Phase 4 噪声谱综合对比
  noise_spectrum:
    - discrete
    - rc_beta001
    - rc_beta05
    - osa
