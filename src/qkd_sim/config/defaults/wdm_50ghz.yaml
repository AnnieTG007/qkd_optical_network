# WDM 50GHz 间隔系统默认参数
# C波段，中心 193.5 THz

f_center: 1.935e+14              # 中心频率 [Hz] (193.5 THz)
N_ch: 16                         # 信道数
channel_spacing: 5.0e+10         # 信道间隔 [Hz] (50 GHz)
B_s: 3.2e+10                     # 信号带宽/符号速率 [Hz] (32 GBaud)
P0: 1.0e-3                       # 单信道发射功率 [W] (0 dBm)
beta_rolloff: 0.0                # 升余弦滚降因子
quantum_channel_indices: []      # 量子信道索引（空=全部为经典）
